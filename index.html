<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | أشرف المطور</title>
    <style>
        :root { --blue-royal: #007bff; --black-bg: #000; }
        body { background: var(--black-bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; max-width: 400px; margin: auto; box-shadow: 0 10px 40px rgba(0,123,255,0.2); }
        h1 { color: var(--blue-royal); margin-bottom: 20px; }
        input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 20px; outline: none; border: 1px solid var(--blue-royal); }
        .btn-royal { background: var(--blue-royal); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 20px; color: #0f0; font-family: monospace; font-size: 14px; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Creative 2026</h1>
        <p style="color: #888;">مصنع أشرف الصوتي السريع 🎙️</p>
        
        <input type="text" id="textInput" placeholder="اكتب النص هنا...">
        <button class="btn-royal" onclick="speakNow()">نطق النص فوراً 🔊</button>
        
        <div id="status">جاهز للتنفيذ..</div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        function speakNow() {
            const text = document.getElementById('textInput').value;
            const status = document.getElementById('status');
            
            if (!text) { alert("يا كوماندر.. اكتب النص الأول!"); return; }

            status.innerText = ">> جاري النطق بصوت عالي الجودة...";
            
            // استخدام محرك النطق الداخلي للمتصفح (خفيف جداً وبدون بايثون)
            const speech = new SpeechSynthesisUtterance();
            speech.text = text;
            speech.lang = 'ar-SA'; // لغة عربية احترافية
            speech.rate = 0.9;     // سرعة هادئة ملكية
            
            window.speechSynthesis.speak(speech);
            
            speech.onend = () => {
                status.innerText = "✅ تمت المهمة بنجاح يا كوماندر أشرف!";
            };
        }
    </script>
</body>
</html>
