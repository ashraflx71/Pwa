<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | VideoGen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007bff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; max-width: 450px; margin: auto; }
        input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid var(--blue); background: #000; color: #fff; margin: 15px 0; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
        #vRes { width: 100%; margin-top: 20px; border-radius: 15px; display: none; border: 2px solid var(--blue); }
        #saveBtn { background: #28a745; display: none; margin-top: 15px; text-decoration: none; padding: 15px; border-radius: 50px; color: white; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--blue);">Creative 2026</h1>
    <p style="color:#888;">مصنع أشرف للإنتاج الآلي 🏭</p>
    <input type="text" id="tIn" placeholder="اكتب نص الفيديو الطويل هنا...">
    <button id="go" class="btn" onclick="startGen()">🚀 إنتاج الفيديو الآن</button>
    <div id="st" style="margin-top:10px; color: var(--blue);"></div>
    <video id="vRes" controls playsinline></video>
    <a id="saveBtn">📥 حفظ الفيديو في المعرض</a>
</div>

<canvas id="cnv" width="640" height="360"></canvas>

<script>
async function startGen() {
    const text = document.getElementById('tIn').value;
    const btn = document.getElementById('go');
    const status = document.getElementById('st');
    const video = document.getElementById('vRes');
    const save = document.getElementById('saveBtn');
    const canvas = document.getElementById('cnv');
    const ctx = canvas.getContext('2d');

    if(!text) return alert("ادخل النص يا كوماندر!");

    btn.disabled = true;
    status.innerText = "⏳ جاري تحريك النصوص سحابياً...";
    video.style.display = "none";
    save.style.display = "none";

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        video.src = url;
        video.style.display = "block";
        video.play(); // تشغيل تلقائي للتأكد
        save.href = url;
        save.download = `Ashraf_Creative_2026.mp4`;
        save.style.display = "block";
        status.innerText = "✅ تم الإنتاج بنجاح!";
        btn.disabled = false;
    };

    recorder.start();
    let f = 0;
    function draw() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,640,360);
        ctx.strokeStyle = '#007bff'; ctx.lineWidth = 10; ctx.strokeRect(10,10,620,340);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 30px Cairo'; ctx.textAlign = 'center';
        
        // رسم النص (دعم النصوص الطويلة)
        const words = text.split(' ');
        let line = '';
        let y = 150;
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (ctx.measureText(testLine).width > 580 && n > 0) {
                ctx.fillText(line, 320, y);
                line = words[n] + ' ';
                y += 45;
            } else { line = testLine; }
        }
        ctx.fillText(line, 320, y);

        if (f < 150) { // فيديو لمدة 5 ثواني
            f++;
            requestAnimationFrame(draw);
        } else { recorder.stop(); }
    }
    draw();
}
</script>
</body>
</html>
