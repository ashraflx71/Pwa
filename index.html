<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | AutoGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007bff; --green: #28a745; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #111; border: 1px solid #222; border-radius: 30px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 50px rgba(0,123,255,0.3); }
        .btn-main { background: linear-gradient(45deg, var(--blue), #0056b3); color: white; border: none; padding: 25px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; font-size: 20px; box-shadow: 0 8px 20px rgba(0,123,255,0.4); transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }
        .btn-save { background: var(--green); color: white; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: bold; display: none; text-decoration: none; margin-top: 25px; font-size: 16px; }
        #vRes { width: 100%; margin-top: 25px; border-radius: 20px; display: none; border: 3px solid var(--blue); }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--blue); margin-bottom: 10px;">Creative 2026</h1>
    <p style="color:#666; margin-bottom: 30px;">نظام الأتمتة الذكي | أشرف المطور</p>
    
    <button id="go" class="btn-main" onclick="autoGen()">🚀 تشغيل المصنع الآن</button>
    
    <div id="status" style="margin-top:20px; color: var(--blue); font-weight: bold;"></div>
    
    <video id="vRes" controls playsinline></video>
    <a id="save" class="btn-save">📥 حفظ الفيديو المنتج</a>
</div>

<canvas id="cnv" width="640" height="360"></canvas>

<script>
// قائمة النصوص الاحترافية (المصنع هيختار منها عشوائياً)
const ashrafScripts = [
    "Creative 2026 | مستقبل الأتمتة الرقمية برؤية أشرف المطور",
    "تصدر نتائج البحث (SEO) يبدأ من تجربة مستخدم (UI/UX) ذكية",
    "البرمجيات الخضراء: كفاءة عالية، سرعة فائقة، واستهلاك أقل",
    "أشرف المطور: تحويل الأفكار إلى أصول رقمية قوية ومستدامة"
];

async function autoGen() {
    const btn = document.getElementById('go');
    const status = document.getElementById('status');
    const video = document.getElementById('vRes');
    const save = document.getElementById('save');
    const canvas = document.getElementById('cnv');
    const ctx = canvas.getContext('2d');

    // اختيار نص عشوائي
    const text = ashrafScripts[Math.floor(Math.random() * ashrafScripts.length)];

    btn.disabled = true;
    status.innerText = "⏳ جاري الرندر الآلي...";
    video.style.display = "none";
    save.style.display = "none";

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        video.src = url;
        video.style.display = "block";
        video.play();
        save.href = url;
        save.download = `Creative2026_Auto_${Date.now()}.mp4`;
        save.style.display = "block";
        status.innerText = "✅ تم الإنتاج بنجاح!";
        btn.disabled = false;
    };

    recorder.start();
    let f = 0;
    function draw() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,640,360);
        ctx.strokeStyle = '#007bff'; ctx.lineWidth = 15; ctx.strokeRect(15,15,610,330);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Cairo'; ctx.textAlign = 'center';
        
        // تقسيم النص تلقائياً
        const words = text.split(' ');
        let line = ''; let y = 160;
        for(let n=0; n<words.length; n++){
            let test = line + words[n] + ' ';
            if(ctx.measureText(test).width > 540 && n>0){
                ctx.fillText(line, 320, y); line = words[n] + ' '; y += 50;
            } else { line = test; }
        }
        ctx.fillText(line, 320, y);

        ctx.font = '18px Cairo'; ctx.fillStyle = '#007bff';
        ctx.fillText("Production: Ashraf | 2026", 320, 310);

        if(f < 150) { f++; requestAnimationFrame(draw); }
        else { recorder.stop(); }
    }
    draw();
}
</script>
</body>
</html>
