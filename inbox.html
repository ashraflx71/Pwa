        :root {
            --black-royal: #000000;
            --blue-royal: #007bff;
            --card-bg: #0a0a0a;
            --text-gray: #b0b0b0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--black-royal);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            border-top: 5px solid var(--blue-royal);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* تنسيق الشعار */
        .logo-box {
            text-align: center;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-out;
        }
        
        .logo-box svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 10px rgba(0, 123, 255, 0.4));
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--blue-royal);
            transform: translateY(-5px);
        }

        h1 { 
            color: var(--blue-royal); 
            font-size: 2rem; 
            margin: 15px 0 5px 0;
            letter-spacing: -1px;
        }

        p { 
            color: var(--text-gray); 
            font-size: 1.05rem; 
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-action {
            background: var(--blue-royal);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-action:hover {
            background: #0056b3;
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
        }

        .btn-action:active { transform: scale(0.96); }
