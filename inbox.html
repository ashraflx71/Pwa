<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><link rel="manifest" href="manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoGen PWA - أشرف</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .pwa-container { width: 90%; max-width: 400px; padding: 25px; border: 2px solid #1a73e8; border-radius: 20px; background: #050505; box-shadow: 0 10px 30px rgba(26, 115, 232, 0.3); text-align: center; }
        h1 { color: #1a73e8; font-size: 22px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #1a73e8, #0056b3); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        #log { margin-top: 20px; font-size: 14px; color: #ffd700; min-height: 40px; }
    </style>
</head>
<body>

    <div class="pwa-container">
        <h1>Creative 2026 - VideoGen</h1>
        <p style="color: #888;">أتمتة الفيديو السحابي (أشرف)</p>
        
        <input type="text" id="scriptText" placeholder="اكتب نص الفيديو هنا...">
        
        <button id="btnRender">🚀 إنتاج الفيديو سحابياً</button>

        <div id="log">جاهز للعمل..</div>
    </div>

    <script>
        // مفتاحك السحابي الذي حصلنا عليه
        const API_KEY = "tTnPCcOZUP3zI6tDjcaLs1Nx4KgWStkSBmhj3mIl";
        const API_URL = "https://api.shotstack.io/edit/v1/render";

        document.getElementById('btnRender').onclick = async () => {
            const text = document.getElementById('scriptText').value;
            const log = document.getElementById('log');

            if(!text) { log.innerText = "❌ فضلاً اكتب نصاً أولاً"; return; }

            log.innerText = "☁️ جارٍ إرسال الأمر للسحاب...";

            const payload = {
                "timeline": {
                    "background": "#000000",
                    "tracks": [{
                        "clips": [{
                            "asset": { "type": "title", "text": text, "style": "royal" },
                            "start": 0, "length": 5
                        }]
                    }]
                },
                "output": { "format": "mp4", "resolution": "sd" }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify(payload)
                });

                const res = await response.json();
                if (response.status === 201) {
                    log.innerHTML = `✅ تم البدء!<br>ID: ${res.response.id}<br>افحص بريدك أو حسابك الآن.`;
                } else {
                    log.innerText = "❌ خطأ سحابي: " + res.message;
                }
            } catch (e) {
                log.innerText = "❌ فشل الاتصال.. تحقق من الشبكة.";
            }
        };
    </script>
</body>
</html>
